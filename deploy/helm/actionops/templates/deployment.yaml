apiVersion: apps/v1
kind: Deployment
metadata:
  name: actionops-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: actionops-backend
  template:
    metadata:
      labels:
        app: actionops-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          ports:
            - containerPort: 8080
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: actionops-backend
spec:
  selector:
    app: actionops-backend
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
