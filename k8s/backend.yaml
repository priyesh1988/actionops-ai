apiVersion: apps/v1
kind: Deployment
metadata:
  name: actionops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: actionops-backend
  template:
    metadata:
      labels:
        app: actionops-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/actionops-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_MODE
              value: jwt
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: actionops-db
                  key: url
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318/v1/traces
---
apiVersion: v1
kind: Service
metadata:
  name: actionops-backend
spec:
  selector:
    app: actionops-backend
  ports:
    - port: 8080
      targetPort: 8080
